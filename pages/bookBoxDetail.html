<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>BookBox Detail</title>

    <link rel="stylesheet" href="../css/bookBoxDetail.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="manifest" href="../manifest.webmanifest" />
    <meta name="theme-color" content="#4747D0" />
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="icon" href="../icons/icon-192.png" sizes="192x192">
    <link rel="icon" href="../icons/icon-256.png" sizes="256x256">
    <link rel="icon" href="../icons/icon-512.png" sizes="512x512">
    <meta name="msapplication-TileColor" content="#4747D0">
    <meta name="msapplication-square150x150logo" content="/icons/icon-256.png">
    <!-- iOS install support (optional but nice) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="../icons/icon-192.png" />
    <!-- Cloudinary Image Upload -->
    <script src="../js/cloudinary-config.js"></script>
    <script src="../js/image-upload.js"></script>
    <script src="../components/navbar.js" type="module"></script>
    <script type="module" src="../js/update-navbar-avatar.js"></script>
    <script type="module" src="../js/bookBoxDetail.js" defer></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
</head>

<body>

    <app-navbar brand="Street Reads" href="/">
    </app-navbar>
    <!-- <header>
        <h1><a href="../pages/homepage.html">Street Reads</a></h1>
        <div class="header-button">
            <a href="../pages/user-profile.html"><img src="https://picsum.photos/100/100?random=$" alt=""></a>
        </div>
    </header> -->

    <main>
        <div class="left">
            <!-- BOOK BOX -->
            <div class="boxDetail">
                <div class="info">
                    <h2 id="boxName">Loading</h2>
                    <p id="boxAddress"></p>
                </div>
                <div class="fav">
                    <button id="favButton">
                        <span id="favText">Add to Favorites</span>
                        <span id="favIcon" class="fa-regular fa-heart"></span>
                    </button>
                </div>
            </div>
            <div id="imagePopup" class="popup" style="display:none;">
                <span class="close">&times;</span>
                <img id="popupImg" src="">
            </div>

            <div class="imgContainer">
                <div class="images" id="boxImages">
                    <!-- <img src="https://picsum.photos/300/400?random=1" alt="">
                    <img src="https://picsum.photos/300/400?random=2" alt="">
                    <img src="https://picsum.photos/300/400?random=3" alt="">
                    <img src="https://picsum.photos/300/400?random=4" alt="">
                    <img src="https://picsum.photos/300/400?random=5" alt="">
                    <img src="https://picsum.photos/300/400?random=6" alt="">
                    <img src="https://picsum.photos/300/400?random=7" alt="">
                    <img src="https://picsum.photos/300/400?random=8" alt="">
                    <img src="https://picsum.photos/300/400?random=9" alt="">
                    <img src="https://picsum.photos/300/400?random=10" alt="">
                    <img src="https://picsum.photos/300/400?random=11" alt=""> -->
                </div>
            </div>
            <div class="btnContainer">
                <button class="btn" id="addBoxPicBtn">
                    Add a Picture
                    <input type="file" id="boxPicInput" accept="image/*" style="display:none">
                </button>
            </div>

            <!-- RATING -->
            <div class="rateBox">
                <p>Rate This BookBox</p>
                <div class="rateContainer">
                    <div class="starsAvg" id="rateAvg">
                        <!-- <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i> -->
                    </div>
                    <button class="btn btn-open">Add a Review</button>
                </div>
            </div>
            <!-- POP UP -->
            <section class="modal hidden">
                <div class="flex">
                    <button class="btn-close">⨉</button>
                </div>
                <form action="submit" method="post" name="form" id="form">
                    <p for="review" class="form-title">Add a Review </p>

                    <label for="reviewerName">Name</label>
                    <input type="text" id="reviewerName">

                    <label for="reviewText">Review</label>
                    <textarea id="reviewText"></textarea>

                    <div class="stars" id="rating">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                    <div class="btnContainer">
                        <button type="submit" class="btn">Send</button>
                    </div>
                </form>
            </section>
            <div class="overlay hidden"></div>
            <!-- <button class="btn btn-open">Add a Review</button> -->
            <!-- REVIEW BOX -->
            <p class="bold">Reviews</p>
            <div class="reviewContainer">
                <div id="reviewsContainer"></div>
            </div>
        </div>

        <div class="right">
            <!-- LEAVE MESSAGES -->
            <p class="bold">What People are saying</p>

            <div id="chatContainer">
                <div id="messages"></div>

                <div id="chatInputArea">
                    <input type="text" id="chatInput" />
                    <button id="sendBtn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                    <button id="attachBtn">
                        <i class="fa-solid fa-paperclip"></i>
                        <input type="file" id="attachInput" style="display:none" accept="image/*">
                    </button>

                </div>
            </div>
        </div>
    </main>
</body>

</html>

</html>
