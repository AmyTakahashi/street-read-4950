<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Street Reads – Offline</title>
    <meta name="theme-color" content="#4747D0" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        body {
            display: grid;
            place-items: center;  
            min-height: 100dvh;
            padding: 24px;
            text-align: center;
        }

        .card {
            max-width: 520px;
            border: 1px solid #C5BAD4;
            border-radius: 12px;
            padding: 24px;
            background: #EBF2FF;
        }

        h1 {
            margin: 0 0 8px;
        }

        p {
            margin: 0 0 12px;
            color: #293344;
        }

        .muted {
            color: #6b7280;
            font-size: .95rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Offline</h1>
        <p>You don’t have a network connection right now.</p>
        <p class="muted">Pages you visited before may still work. Try again when you’re back online.</p>
    </div>
</body>

</html>
