<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Reads</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4747D0" />
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192">
    <link rel="icon" href="/icons/icon-256.png" sizes="256x256">
    <link rel="icon" href="/icons/icon-512.png" sizes="512x512">
    <meta name="msapplication-TileColor" content="#4747D0">
    <meta name="msapplication-square150x150logo" content="/icons/icon-256.png">
    <!-- iOS install support (optional but nice) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- css and js -->
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/app.js" defer></script>
</head>
<body>
    <main class="wrap" aria-busy="true">
        <h1 class="logo">Street&nbsp;Reads</h1>
        <div class="loader" role="status" aria-live="polite" aria-label="Loading">
            <span class="sr-only">Loading…</span>
        </div>
        <p class="tag">Starting up…</p>
        <noscript>
            <p class="tag">JavaScript required. You’ll be sent to the login page.</p>
        </noscript>
    </main>
    
    
    <!-- Noscript fallback -->
    <noscript>
        <meta http-equiv="refresh" content="2;url=/login.html?next=/" />
    </noscript>
    
</body>
</html>
